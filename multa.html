<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagar Multas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bodym">

  <div class="fundo">
    
    <button class="voltar">❮</button>

    <div class="card">
      <h1>Pagar Multas</h1>

      <p class="sub">
        Para pagar multas <a href="https://pagtesouro.tesouro.gov.br/portal-gru/#/pagamento-gru/formulario?servico=011327">clique aqui</a> para ser redirecionado ao gov.br
      </p>

      <div class="caixa">
        Preencha o campo “CPF ou CNPJ do Contribuinte” com o seu CPF
      </div>

      <div class="caixa">
        Preencha o campo “Nome de Contribuinte” com seu nome
      </div>

      <div class="caixa">
        No campo “Número de Referência”, preencha com o número 11
      </div>

    </div>

  </div>

</body>
</html>
